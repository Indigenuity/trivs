<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question 15 - Hokey Pokey Names</title>
  <link rel="stylesheet" href="../assets/trivs.css">
  <style>
    .fit-stage {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background: #000;
      padding: 6px;
    }

    .quad-grid {
      width: min(100%, calc((100vh - var(--topbar-height)) * 16 / 9));
      height: min(100%, calc(100vw * 9 / 16));
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 2px;
      background: #000;
    }

    .quad {
      position: relative;
      background: radial-gradient(circle at center, #1f1f1f 0%, #050505 78%);
      border: 1px solid #2b2b2b;
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 18px;
    }

    .term-text {
      font-size: clamp(34px, 4.6vw, 64px);
      font-weight: 800;
      color: #f8f8f8;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .answer-label {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      opacity: 0;
      transition: opacity 250ms ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .answer-label.visible {
      opacity: 1;
    }

    .center-overlay {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      min-width: min(84vw, 640px);
      background: rgba(0, 0, 0, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      opacity: 0;
      pointer-events: auto;
      transition: opacity 300ms ease;
    }

    .center-overlay.visible {
      opacity: 1;
    }

    .center-overlay h2 {
      margin: 0 0 10px;
      font-size: 18px;
      font-weight: 700;
    }

    .center-overlay p {
      margin: 6px 0;
      font-size: 20px;
      font-weight: 700;
    }

    .reveal-btn {
      margin-top: 14px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      background: #f3f3f3;
      color: #111;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body data-power-seconds="30" data-points="100 points each">
  <header class="topbar">
    <div class="topbar-left">
      <a class="home-link" href="../index.html">Back to Index</a>
      <span class="question-title">Question 15 - Hokey Pokey Names</span>
    </div>
    <div class="topbar-right">
      <div class="power-wrap">
        <span class="power-dot active" data-power-dot aria-hidden="true"></span>
        <span class="power-label" data-power-text>Power active</span>
      </div>
      <span class="points-pill" data-points-text>100 points each</span>
    </div>
  </header>

  <main class="page-main fit-stage">
    <div class="quad-grid">
    <section class="quad">
      <div class="term-text">Hokey Cokey</div>
      <div class="answer-label">UK / Aus / NZ</div>
    </section>
    <section class="quad">
      <div class="term-text">Hokey Tokey</div>
      <div class="answer-label">New Zealand</div>
    </section>
    <section class="quad">
      <div class="term-text">Rucki-Zucki</div>
      <div class="answer-label">Germany</div>
    </section>
    <section class="quad">
      <div class="term-text">Hockey-Pockey</div>
      <div class="answer-label">Mexico</div>
    </section>
    </div>
  </main>

  <section id="centerOverlay" class="center-overlay" aria-live="polite">
    <h2>Countries (Random Order)</h2>
    <div id="countryList"></div>
    <button id="revealBtn" class="reveal-btn" type="button">Reveal Answer</button>
  </section>

  <script src="../assets/trivs.js"></script>
  <script>
    const answers = ["UK / Aus / NZ", "New Zealand", "Germany", "Mexico"];
    const countryList = document.getElementById("countryList");
    const centerOverlay = document.getElementById("centerOverlay");
    const revealBtn = document.getElementById("revealBtn");

    function shuffle(values) {
      const cloned = [...values];
      for (let i = cloned.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [cloned[i], cloned[j]] = [cloned[j], cloned[i]];
      }
      return cloned;
    }

    setTimeout(() => {
      const randomized = shuffle(answers);
      countryList.innerHTML = "";
      randomized.forEach((name) => {
        const p = document.createElement("p");
        p.textContent = name;
        countryList.appendChild(p);
      });
      centerOverlay.classList.add("visible");
    }, 30000);

    revealBtn.addEventListener("click", () => {
      document.querySelectorAll(".answer-label").forEach((el) => el.classList.add("visible"));
      revealBtn.disabled = true;
      revealBtn.textContent = "Answers Revealed";
    });
  </script>
</body>
</html>
