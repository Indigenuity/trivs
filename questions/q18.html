<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question 18 - Quizbowl</title>
  <link rel="stylesheet" href="../assets/trivs.css">
</head>
<body class="text-only" data-power-seconds="0" data-points="100 points">
  <header class="topbar">
    <div class="topbar-left">
      <a class="home-link" href="../index.html">Back to Index</a>
      <span class="question-title">Question 18 - Quizbowl</span>
    </div>
    <div class="topbar-right">
      <div class="power-wrap">
        <span class="power-dot" data-power-dot aria-hidden="true"></span>
        <span class="power-label" data-power-text>Power active</span>
      </div>
      <span class="points-pill" data-points-text>100 points</span>
    </div>
  </header>

  <main class="question-shell">
    <section class="question-card">
      <p id="questionText" class="subprompt"></p>
      <div id="revealPanel" class="reveal-panel hidden">
        <button class="action-btn primary" data-reveal-btn data-answer-target="#answer">Reveal Answer</button>
      </div>
      <div id="answer" class="reveal-overlay hidden">
        Answer: Wood glue (accept: PVA glue, polyvinyl acetate, carpenter's glue, or white glue)
      </div>
    </section>
  </main>

  <script src="../assets/trivs.js"></script>
  <script>
    const questionTextEl = document.getElementById("questionText");
    const revealPanel = document.getElementById("revealPanel");
    const powerDot = document.querySelector("[data-power-dot]");
    const powerLabel = document.querySelector("[data-power-text]");

    const textToReveal = `The "Type II" and "Type III" varieties of this liquid utilize advanced cross-linking bonds to achieve higher levels of water resistance. Aliphatic resin is a slightly yellowish, highly tackified version of it, though the standard formulation found in almost all modern woodshops is primarily made of polyvinyl acetate, or PVA. When utilizing this wet substance, a woodworker will look for a continuous bead of "squeeze-out" along a seam (*) to guarantee maximum penetration before locking the boards down with heavy clamping pressure. Titebond is the industry-standard brand of, for 100 points, what sticky liquid used to permanently bond pieces of timber together?`;

    let cursor = 0;
    let powerExpired = false;

    function setPowerActive() {
      if (!powerDot || !powerLabel) return;
      powerDot.classList.remove("expired");
      powerDot.classList.add("active");
      powerLabel.textContent = "Power active";
    }

    function setPowerExpired() {
      if (!powerDot || !powerLabel || powerExpired) return;
      powerDot.classList.remove("active");
      powerDot.classList.add("expired");
      powerLabel.textContent = "Power expired";
      powerExpired = true;
    }

    function nextDelay(character) {
      if (character === "." || character === "!" || character === "?") return 360;
      if (character === "," || character === ";" || character === ":") return 210;
      if (character === " ") return 64;
      return 52;
    }

    function revealNextCharacter() {
      if (cursor >= textToReveal.length) {
        if (revealPanel) revealPanel.classList.remove("hidden");
        return;
      }
      const character = textToReveal[cursor];
      questionTextEl.textContent += character;
      if (character === "*") setPowerExpired();
      cursor += 1;
      setTimeout(revealNextCharacter, nextDelay(character));
    }

    setPowerActive();
    revealNextCharacter();
  </script>
</body>
</html>
